kind = "web"
previewPath = "/wiqaya-admin/"
title = "وقاية - لوحة التحكم"
version = "1.0.0"
id = "artifacts/wiqaya-admin"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/wiqaya-admin/" ]
localPort = 19062

[services.development]
run = "pnpm --filter @workspace/wiqaya-admin run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/wiqaya-admin", "run", "build" ]
publicDir = "artifacts/wiqaya-admin/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19062"
BASE_PATH = "/wiqaya-admin/"
