<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Application Update Required — Sham Cash</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page">
    <div class="blob-left"></div>
    <div class="blob-right"></div>

    <div class="container" style="align-items:center;justify-content:center">
      <!-- Logo -->
      <div class="sham-logo" style="margin-bottom:8px">
        <div class="shape-green"></div>
        <div class="shape-purple"></div>
      </div>

      <!-- Update icon -->
      <div class="update-icon-wrap">
        <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"/>
          <path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/>
        </svg>
      </div>

      <!-- Title -->
      <h1 class="update-title">Application Update Required</h1>
      <p class="update-subtitle">
        يتوفر تحديث جديد لتطبيق شام كاش.<br>
        يُرجى تحديث التطبيق للاستمرار في استخدام الخدمة.
      </p>

      <!-- Version badge -->
      <div style="
        background:rgba(42,48,71,0.80);
        border:1px solid rgba(255,255,255,0.06);
        border-radius:12px;
        padding:10px 20px;
        display:inline-flex;align-items:center;gap:10px;
        margin-bottom:32px;
        font-size:13px;font-weight:700;color:rgba(201,204,219,0.70)
      ">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        الإصدار الحالي: <span style="color:#fff">2.2.4</span>
        &nbsp;→&nbsp; الإصدار الجديد: <span style="color:#1fc28a">2.3.0</span>
      </div>

      <!-- Buttons -->
      <div style="width:100%;max-width:340px;display:flex;flex-direction:column;gap:12px">
        <!-- Update Now — opens official store link -->
        <a href="https://play.google.com/store/apps/details?id=com.mobiledevelopmentzone.shamCash"
           target="_blank" rel="noopener noreferrer"
           class="btn btn-primary btn-full"
           style="font-size:18px;text-align:center">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0">
            <polyline points="23 4 23 10 17 10"/>
            <path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/>
          </svg>
          تحديث الآن
        </a>

        <!-- Close / skip -->
        <button onclick="window.location.href='index.html'" class="btn btn-secondary btn-full" style="font-size:16px">
          إغلاق
        </button>
      </div>

      <!-- Footer note -->
      <p style="font-size:12px;font-weight:600;color:rgba(201,204,219,0.40);margin-top:32px;text-align:center;line-height:1.6">
        للحصول على أفضل تجربة وأمان أعلى<br>يُنصح بتحديث التطبيق فوراً
      </p>
    </div>
  </div>
</body>
</html>
