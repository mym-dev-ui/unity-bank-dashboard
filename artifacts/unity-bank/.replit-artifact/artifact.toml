kind = "web"
previewPath = "/unity-bank/"
title = "Unity Bank"
version = "1.0.0"
id = "artifacts/unity-bank"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/unity-bank/" ]
localPort = 26000

[services.development]
run = "pnpm --filter @workspace/unity-bank run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/unity-bank", "run", "build" ]
publicDir = "artifacts/unity-bank/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26000"
BASE_PATH = "/unity-bank/"
